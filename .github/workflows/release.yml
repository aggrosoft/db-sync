name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          BIN_NAME="db-sync"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi

          OUT_DIR="dist/${GOOS}-${GOARCH}"
          ARCHIVE_BASENAME="db-sync_${VERSION#v}_${GOOS}_${GOARCH}"
          LDFLAGS="-s -w -X db-sync/internal/cli.Version=${VERSION}"

          mkdir -p "$OUT_DIR"
          go build -trimpath -ldflags="$LDFLAGS" -o "$OUT_DIR/$BIN_NAME" ./cmd/db-sync
          cp README.md "$OUT_DIR/README.md"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd "$OUT_DIR"
              zip -r "../${ARCHIVE_BASENAME}.zip" "$BIN_NAME" README.md
            )
          else
            tar -C "$OUT_DIR" -czf "dist/${ARCHIVE_BASENAME}.tar.gz" "$BIN_NAME" README.md
          fi

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: ignore

      - name: Upload release package (zip)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: dist/*.zip
          if-no-files-found: ignore

  checksums:
    name: Generate checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create SHA256 checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz *.zip > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: dist/checksums.txt

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - checksums

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt